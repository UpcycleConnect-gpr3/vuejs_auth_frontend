services:
  auth_front_dev:
    build:
      context: .
      target: dev
    container_name: auth_front_dev
    volumes:
      - ./src:/app/src
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth_front_dev.rule=Host(`auth-front.localhost`)"
      - "traefik.http.services.auth_front_dev.loadbalancer.server.port=5173"
    profiles:
      - dev

  auth_front_prod:
    build:
      context: .
      target: prod
    container_name: auth_front_prod
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth_front_prod.rule=Host(`auth-front.localhost`)"
      - "traefik.http.services.auth_front_prod.loadbalancer.server.port=80"
    profiles:
      - prod

networks:
  traefik_network:
    external: true
